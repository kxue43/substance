repos:
  - repo: https://github.com/godaddy/tartufo
    rev: "v6.0.0"
    hooks:
      - id: tartufo

  - repo: https://github.com/kxue43/shell-cmd-on-change
    rev: "2.1.0"
    hooks:
      - id: shell-cmd-on-change
        name: set-up
        args:
          - "-P.keep"
          - "~/.config/substance/set-up.sh"
        stages: [post-merge]
        always_run: true
        verbose: true
